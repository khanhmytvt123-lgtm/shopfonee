<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <form id="register-form">
        <h2>Đăng ký tài khoản</h2>
        <div>
            <label for="inp-username">Tên đăng nhập:</label>
            <input type="text" id="inp-username" name="username">
        </div>
        <div>
            <label for="inp-email">Email:</label>
            <input type="email" id="inp-email" name="email" autocomplete="email">
        </div>
        <div>
            <label for="inp-pwd">Mật khẩu:</label>
            <input type="password" id="inp-pwd" name="password" autocomplete="new-password">
        </div>
        <div>
            <label for="inp-confirm-pwd">Xác nhận mật khẩu:</label>
            <input type="password" id="inp-confirm-pwd" name="confirm-password" autocomplete="new-password">
        </div>
        <button type="submit">Đăng ký</button>
    </form>

    <script src="https://www.gstatic.com/firebasejs/12.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.8.0/firebase-firestore-compat.js"></script>
    
    <script src="./configFirebase.js"></script>

    <script>
        const inpUsername = document.querySelector("#inp-username");
        const inpEmail = document.querySelector("#inp-email");
        const inpPwd = document.querySelector("#inp-pwd");
        const inpConfirmPwd = document.querySelector("#inp-confirm-pwd");
        const registerForm = document.querySelector("#register-form");

        function handleRegister(event) {
            event.preventDefault();

            const username = inpUsername.value.trim();
            const email = inpEmail.value.trim();
            const password = inpPwd.value;
            const confirmPassword = inpConfirmPwd.value;

            // 1. Kiểm tra rỗng
            if (!username || !email || !password || !confirmPassword) {
                alert("Vui lòng điền đủ các trường");
                return;
            }

            // 2. Kiểm tra khớp mật khẩu
            if (password !== confirmPassword) {
                alert("Mật khẩu không khớp");
                return;
            }

            // 3. Firebase Auth
            firebase.auth().createUserWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    const user = userCredential.user;
                    
                    // (Tùy chọn) Cập nhật Display Name cho Firebase Auth
                    return user.updateProfile({
                        displayName: username
                    }).then(() => {
                        alert("Đăng ký thành công!");
                        window.location.href = "./login.html";
                    });
                })
                .catch((error) => {
                    // Hiển thị lỗi cụ thể từ Firebase
                    alert("Lỗi: " + error.message);
                    console.error(error);
                });
        }

        registerForm.addEventListener("submit", handleRegister);
    </script>
</body>
</html>
