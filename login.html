<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <form id="login-form">
        <h2>Đăng nhập tài khoản</h2>
        <div>
            <label for="inp-email">Email:</label>
            <input type="email" id="inp-email" required>
        </div>
        <div>
            <label for="inp-pwd">Mật khẩu:</label>
            <input type="password" id="inp-pwd" required>
        </div>
        <button type="submit" id="btn-login">Đăng Nhập</button>
    </form>

    <script src="https://www.gstatic.com/firebasejs/12.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.8.0/firebase-firestore-compat.js"></script>
    <script src="./js/configFirebase.js"></script>
    <script>
        const loginForm = document.querySelector("#login-form");
        const btnLogin = document.querySelector("#btn-login");

        loginForm.addEventListener("submit", (event) => {
            event.preventDefault();
            const email = document.querySelector("#inp-email").value;
            const password = document.querySelector("#inp-pwd").value;

            btnLogin.innerText = "Đang đăng nhập...";
            btnLogin.disabled = true;

            firebase.auth().signInWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    const user = userCredential.user;
                    const userSession = {
                        uid: user.uid,
                        email: user.email,
                        displayName: user.displayName,
                        expiry: new Date().getTime() + 2 * 60 * 60 * 1000,
                    };
                    localStorage.setItem("user_session", JSON.stringify(userSession));
                    
                    if(user.email === "admin@gmail.com"){
                        window.location.href = "./admin.html";
                    } else {
                        window.location.href = "./index.html";
                    }
                })
                .catch((error) => {
                    alert("Tài khoản hoặc mật khẩu không chính xác");
                    btnLogin.innerText = "Đăng Nhập";
                    btnLogin.disabled = false;
                });
        });
    </script>
</body>
</html>
